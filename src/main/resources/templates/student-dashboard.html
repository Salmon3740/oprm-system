<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}"></head>

<body>
    <div th:replace="~{layout :: header}"></div>
    <div th:replace="~{layout :: sidebar}"></div>

    <main class="main-content">
        <div class="container-fluid">
            <h2 class="mb-4 fw-bold">Student Dashboard</h2>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card p-4 text-center">
                        <h3 class="text-primary fw-bold" th:text="${projectCount != null ? projectCount : '0'}">0</h3>
                        <p class="text-muted">My Projects</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-4 text-center">
                        <h3 class="text-success fw-bold" th:text="${activeProjects != null ? activeProjects : '0'}">0
                        </h3>
                        <p class="text-muted">Active Projects</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-4 text-center">
                        <h3 class="text-warning fw-bold"
                            th:text="${notificationCount != null ? notificationCount : '0'}">0</h3>
                        <p class="text-muted">Notifications</p>
                    </div>
                </div>
            </div>

            <div class="row mt-5">
                <div class="col-12">
                    <div class="card p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="fw-bold">My Recent Projects</h4>
                            <a href="/projects/submit" class="btn btn-primary">Submit New Project</a>
                        </div>
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Domains</th>
                                    <th>Status</th>
                                    <th>Progress</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="project : ${projects}">
                                    <td th:text="${project.title}">Project Title</td>
                                    <td th:text="${project.detectedDomains}">Machine Learning</td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${'bg-' + (project.status.name() == 'COMPLETED' ? 'success' : 'primary')}"
                                            th:text="${project.status}">Status</span>
                                    </td>
                                    <td>
                                        <div class="progress" style="height: 8px;">
                                            <div class="progress-bar" role="progressbar"
                                                th:style="'width: ' + ${project.progressPercent} + '%'"
                                                th:aria-valuenow="${project.progressPercent}" aria-valuemin="0"
                                                aria-valuemax="100"></div>
                                        </div>
                                    </td>
                                    <td>
                                        <a th:href="@{'/projects/' + ${project.projectId}}"
                                            class="btn btn-sm btn-outline-primary">View</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(projects)}">
                                    <td colspan="5" class="text-center text-muted">No projects submitted yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
