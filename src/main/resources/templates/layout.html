<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPRM - Online Project Resource Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        .navbar-brand,
        .nav-link {
            color: white !important;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: #2563eb;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .sidebar {
            height: 100vh;
            background: white;
            border-right: 1px solid #e5e7eb;
            position: fixed;
            width: 250px;
            padding-top: 20px;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
        }

        .nav-sidebar-link {
            display: block;
            padding: 12px 24px;
            color: #4b5563;
            text-decoration: none;
            border-radius: 8px;
            margin: 4px 16px;
            transition: all 0.2s;
        }

        .nav-sidebar-link:hover {
            background: #f3f4f6;
            color: #2563eb;
        }

        .nav-sidebar-link.active {
            background: #eff6ff;
            color: #2563eb;
            font-weight: 600;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
        }
    </style>
</head>

<body>
    <div th:fragment="header" class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">OPRM System</a>
            <div class="ms-auto" th:if="${#authentication != null}">
                <span class="text-white me-3" th:text="${#authentication.name}">Username</span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </div>

    <div th:fragment="sidebar" class="sidebar">
        <h5 class="px-4 mb-4 fw-bold text-primary">OPRM Dashboard</h5>
        <a href="/dashboard" class="nav-sidebar-link">Overview</a>

        <div th:if="${#authorization.expression('hasRole(''STUDENT'')')}">
            <a href="/projects/submit" class="nav-sidebar-link">Submit Project</a>
            <a href="/projects/my" class="nav-sidebar-link">My Projects</a>
            <a href="/mentors/suggestions" class="nav-sidebar-link">Mentor Suggestions</a>
        </div>

        <div th:if="${#authorization.expression('hasRole(''PROFESSOR'')')}">
            <a href="/professor/projects" class="nav-sidebar-link">Project Requests</a>
            <a href="/professor/mentees" class="nav-sidebar-link">Current Mentees</a>
        </div>

        <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
            <a href="/admin/users" class="nav-sidebar-link">Manage Users</a>
            <a href="/admin/projects" class="nav-sidebar-link">All Projects</a>
            <a href="/admin/resources" class="nav-sidebar-link">Resources</a>
        </div>

        <a href="/resources" class="nav-sidebar-link">Resource Library</a>
        <a href="/profile" class="nav-sidebar-link">&#128100; My Profile</a>
        <a href="/notifications" class="nav-sidebar-link">Notifications</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
