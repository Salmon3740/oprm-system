<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}">
    <title>Reset Password - OPRM</title>
</head>

<body class="bg-light">
    <div th:replace="~{layout :: header}"></div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="card p-5 glass-panel" style="width: 100%; max-width: 450px;">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark">Reset Password</h3>
                <p class="text-muted">Please enter your new password below.</p>
            </div>

            <div id="errorMessage" class="alert alert-danger d-none"></div>
            <div id="successMessage" class="alert alert-success d-none"></div>

            <form id="resetPasswordForm">
                <input type="hidden" id="email" th:value="${email}">

                <div class="mb-3">
                    <label class="form-label text-dark fw-medium">New Password</label>
                    <input type="password" id="newPassword" class="form-control form-control-lg"
                        placeholder="Enter new password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-dark fw-medium">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control form-control-lg"
                        placeholder="Confirm new password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 mb-3 fw-bold">Update Password</button>
            </form>

            <div class="text-center mt-3">
                <a href="/login" class="text-decoration-none text-primary fw-medium">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            if (!email) {
                errorDiv.textContent = 'Invalid session. Please restart the reset process.';
                errorDiv.classList.remove('d-none');
                return;
            }

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.classList.remove('d-none');
                successDiv.classList.add('d-none');
                return;
            }

            errorDiv.classList.add('d-none');

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword })
                });

                if (response.ok) {
                    document.getElementById('resetPasswordForm').reset();
                    successDiv.innerHTML = `Password successfully reset! You can now <a href="/login">login</a>.`;
                    successDiv.classList.remove('d-none');
                    document.querySelector('button[type="submit"]').disabled = true;
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.message || 'Failed to update password';
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.textContent = 'Server error. Please try again.';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
