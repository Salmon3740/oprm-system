<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}">
    <title>Forgot Password - OPRM</title>
</head>

<body class="bg-light">
    <div th:replace="~{layout :: header}"></div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="card p-5 glass-panel" style="width: 100%; max-width: 450px;">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark">Forgot Password</h3>
                <p class="text-muted">Enter your email and the secret key you received during registration to reset your
                    password.</p>
            </div>

            <div id="errorMessage" class="alert alert-danger d-none"></div>

            <form id="forgotPasswordForm">
                <div class="mb-3">
                    <label class="form-label text-dark fw-medium">Email Address</label>
                    <input type="email" id="email" class="form-control form-control-lg" placeholder="Enter your email"
                        required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-dark fw-medium">Secret Key</label>
                    <input type="text" id="secretKey" class="form-control form-control-lg"
                        placeholder="Enter your 16-character secret key" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 mb-3 fw-bold">Verify Credentials</button>
            </form>

            <div class="text-center mt-3">
                <a href="/login" class="text-decoration-none text-primary fw-medium">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const secretKey = document.getElementById('secretKey').value;

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, secretKey })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
                } else {
                    const errorDiv = document.getElementById('errorMessage');
                    errorDiv.textContent = data.message || 'Verification failed';
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = 'Server error. Please try again.';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
