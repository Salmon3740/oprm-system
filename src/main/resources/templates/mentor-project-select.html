<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}"></head>

<body>
    <div th:replace="~{layout :: header}"></div>
    <div th:replace="~{layout :: sidebar}"></div>
    <main class="main-content">
        <div class="container-fluid">
            <h2 class="mb-4 fw-bold">Select Project for Mentorship</h2>
            <div class="row g-4">
                <div th:each="project : ${projects}" class="col-md-6">
                    <div class="card h-100 p-4 shadow-sm border-0 glass-panel">
                        <h4 class="fw-bold text-primary mb-3" th:text="${project.title}">Project Title</h4>
                        <p class="text-muted mb-4" th:text="${#strings.abbreviate(project.description, 120)}">Short
                            description...</p>
                        <div class="mt-auto">
                            <a th:href="@{'/projects/' + ${project.projectId} + '/suggestions'}"
                                class="btn btn-primary w-100">View AI Mentor Suggestions</a>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(projects)}" class="col-12 text-center py-5">
                    <p class="text-muted">You haven't submitted any projects yet.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
